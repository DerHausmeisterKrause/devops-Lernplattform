apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-platform-alerts
spec:
  groups:
    - name: api
      rules:
        - alert: HighApiErrorRate
          expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "API 5xx rate high"
