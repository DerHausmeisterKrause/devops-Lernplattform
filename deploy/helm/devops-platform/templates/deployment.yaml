apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: devops-platform-api }
  template:
    metadata:
      labels: { app: devops-platform-api }
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
