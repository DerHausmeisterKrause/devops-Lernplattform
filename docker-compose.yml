services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: devops_platform
    ports: ["5432:5432"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.offline
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/devops_platform
    ports: ["8080:8080"]
    depends_on: [postgres]
  terminal-gateway:
    build:
      context: ./terminal-gateway
      dockerfile: Dockerfile.offline
    environment:
      API_BASE: http://backend:8080
    ports: ["8090:8090"]
    depends_on: [backend]
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.offline
    ports: ["3000:80"]
    depends_on: [backend, terminal-gateway]
  grader:
    build: ./grader
    environment:
      API_BASE: http://backend:8080
    depends_on: [backend]
  e2e:
    image: mcr.microsoft.com/playwright:v1.53.0-noble
    working_dir: /work
    volumes:
      - ./e2e:/work
    command: ["npm", "test"]
    depends_on: [frontend]
